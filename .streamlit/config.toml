[theme]
# Mirrors quay-dashboard-v2 design tokens: light paper, white cards,
# navy ink, Quay brand yellow accent.
base = "light"
primaryColor = "#FDC503"            # brand yellow
backgroundColor = "#EEF2F8"         # --paper
secondaryBackgroundColor = "#FFFFFF" # --card
textColor = "#1A2746"               # --ink (deep navy)
font = "sans serif"

[server]
headless = true
runOnSave = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
