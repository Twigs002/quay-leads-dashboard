[theme]
base = "dark"
primaryColor = "#5EEAD4"
backgroundColor = "#0B1220"
secondaryBackgroundColor = "#131C2E"
textColor = "#E6EDF3"
font = "sans serif"

[server]
headless = true
runOnSave = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
