# Copy to .streamlit/secrets.toml and fill in real values.
# secrets.toml is gitignored — never commit it.

[app]
# Local fallback Excel; if google_sheet.id is set, sheet wins.
xlsx_path = "data/leads.xlsx"

[google_sheet]
# Leave empty in dev to read the local Excel instead.
id = ""
# Tab names — match the source workbook.
tab_leads          = "Leads"
tab_raw            = "RawLeads"
tab_onhold         = "OnHold"
tab_inbound_calls  = "RawInboundCall"
tab_sold_listed    = "Sold/Listed"
tab_hot_warm       = "Hot/Warm"
tab_meta_ads       = "Meta"
# (Actioned log lives in Supabase — see supabase/migrations/lead_actions.sql.
#  The source sheet is strictly read-only.)

[gcp_service_account]
# Paste the full service-account JSON contents here as TOML.
# (Streamlit Cloud → Settings → Secrets accepts this verbatim.)
type = "service_account"
project_id = ""
private_key_id = ""
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = ""
client_id = ""
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = ""

[supabase]
# Same Supabase project as quay-clock (the PWA staff log into to clock
# in/out). Both values are PUBLIC — see quay-clock/quay-config.js.
# Staff sign in with their existing username + PIN; the leads dashboard
# additionally requires `is_super = true` OR `is_admin = true` on their
# staff row.
url      = "https://dqszbqiimbfvmmnpgpsb.supabase.co"
anon_key = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxc3picWlpbWJmdm1tbnBncHNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDk4OTQsImV4cCI6MjA5NjQyNTg5NH0.M9RQnJEidyIMZAwbELTSPakiSnvuWBdHTjD7nuOdCZY"

[hubspot]
# HubSpot Private App token — same one used by Twigs002/quay-hubspot.
# When set, every DealID parsed from HubspotStatus2 is enriched with the
# CURRENT stage (+ amount + close date + last modified + owner). When
# blank, the dashboard shows only the stale snapshot stage from the
# source workbook.
#
# Get the token: in HubSpot → Settings → Integrations → Private Apps →
# (existing app) → Auth tab → "Access token". Or copy it from your
# GitHub Actions secret `HUBSPOT_TOKEN` on Twigs002/quay-hubspot.
token = ""
