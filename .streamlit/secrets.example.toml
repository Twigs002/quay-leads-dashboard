# Copy to .streamlit/secrets.toml and fill in real values.
# secrets.toml is gitignored — never commit it.

[app]
# Local fallback Excel; if google_sheet.id is set, sheet wins.
xlsx_path = "data/leads.xlsx"

[google_sheet]
# Leave empty in dev to read the local Excel instead.
id = ""
# Tab names — match the source workbook.
tab_leads          = "Leads"
tab_raw            = "RawLeads"
tab_onhold         = "OnHold"
tab_inbound_calls  = "RawInboundCall"
tab_sold_listed    = "SoldListed"
tab_hot_warm       = "HotWarm"
tab_meta_ads       = "Meta"
tab_actioned       = "Actioned"   # append-only log written by the Action Tracker page

[gcp_service_account]
# Paste the full service-account JSON contents here as TOML.
# (Streamlit Cloud → Settings → Secrets accepts this verbatim.)
type = "service_account"
project_id = ""
private_key_id = ""
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = ""
client_id = ""
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = ""

[supabase]
